<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PW Hook Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ── 顶部工具栏 ── -->
    <header class="toolbar">
        <div class="toolbar-left">
            <span class="logo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line>
                </svg>
                PW Hook Console
            </span>
            <span id="status-badge" class="badge badge-connecting">连接中…</span>
        </div>
        <div class="toolbar-right">
            <!-- 搜索框 -->
            <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="搜索日志..." />
            </div>
            <!-- 级别筛选 -->
            <div class="filter-group">
                <button class="filter-btn active" data-level="all">ALL</button>
                <button class="filter-btn" data-level="log">LOG</button>
                <button class="filter-btn" data-level="info">INFO</button>
                <button class="filter-btn" data-level="warn">WARN</button>
                <button class="filter-btn" data-level="error">ERR</button>
                <button class="filter-btn" data-level="debug">DBG</button>
            </div>
            <div class="divider"></div>
            <label class="toggle-label" title="自动滚动到底部">
                <input type="checkbox" id="auto-scroll" checked />
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span>自动滚动</span>
            </label>
            <button id="export-btn" class="action-btn action-btn-export" title="导出日志文件">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                导出
            </button>
            <button id="clear-btn" class="action-btn" title="清空日志">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6l-1 14H6L5 6"></path>
                    <path d="M10 11v6M14 11v6"></path>
                </svg>
                清空
            </button>
        </div>
    </header>

    <!-- ── 日志区域 ── -->
    <main id="log-container" class="log-container">
        <div id="log-list" class="log-list"></div>
    </main>

    <!-- ── 底部状态栏 ── -->
    <footer class="statusbar">
        <span id="count-info">0 条日志</span>
        <span id="endpoint-info">http://127.0.0.1:28888/api/log/stream</span>
    </footer>

    <script src="main.js"></script>
</body>
</html>
